<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Safe Point</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar"></aside>
    <main class="main-content">
      <div class="page-header">
        <h2>Dashboard</h2>
        <a href="/citizen/report.html" class="btn btn-red btn-sm">+ New Report</a>
      </div>
      <div class="alert-bar alert-bar-red" id="alertBar">
        🔔 <span id="alertText"></span>
      </div>
      <div class="page-body">
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">Total Reports</div>
            <div class="stat-value" id="totalReports">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Pending</div>
            <div class="stat-value" id="pendingReports">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Resolved</div>
            <div class="stat-value" id="resolvedReports">0</div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>Report History</h3>
          </div>
          <div id="reportList" class="report-list">
            <div class="loading">Loading reports...</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Report Detail Modal -->
  <div class="modal-overlay" id="reportModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Report Details</h3>
        <button class="modal-close" onclick="document.getElementById('reportModal').classList.remove('active')">✕</button>
      </div>
      <div class="modal-body" id="reportDetail"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/notification.js"></script>
  <script>
    if (!Auth.requireRole('citizen')) throw '';
    buildSidebar('citizen', 'Dashboard');
    initSocket();
    initNotifications();

    let reports = [];

    const loadReports = async () => {
      try {
        const data = await api('/api/reports');
        reports = data.reports;
        renderReports();
        updateStats();
      } catch (err) {
        showToast(err.message);
      }
    };

    const renderReports = () => {
      const container = document.getElementById('reportList');
      if (reports.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>No reports yet. Submit your first report.</p></div>';
        return;
      }
      container.innerHTML = reports.map(r => `
        <div class="report-item" onclick="showReport('${r._id}')">
          <div class="report-icon">🚨</div>
          <div class="report-info">
            <div class="report-type">${r.crimeType}</div>
            <div class="report-desc">${r.description}</div>
          </div>
          <div class="report-meta">
            <div class="report-date">${formatDate(r.createdAt)}</div>
            ${statusBadge(r.status)}
          </div>
        </div>
      `).join('');
    };

    const updateStats = () => {
      document.getElementById('totalReports').textContent = reports.length;
      document.getElementById('pendingReports').textContent = reports.filter(r => r.status === 'pending').length;
      document.getElementById('resolvedReports').textContent = reports.filter(r => r.status === 'resolved').length;
    };

    const showReport = async (id) => {
      try {
        const data = await api(`/api/reports/${id}`);
        const r = data.report;
        document.getElementById('reportDetail').innerHTML = `
          <div class="report-detail">
            <div class="detail-row"><span class="detail-label">Crime Type</span><span class="detail-value">${r.crimeType}</span></div>
            <div class="detail-row"><span class="detail-label">Description</span><span class="detail-value">${r.description}</span></div>
            <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value">${statusBadge(r.status)}</span></div>
            <div class="detail-row"><span class="detail-label">Location</span><span class="detail-value">${r.location.address || `${r.location.lat.toFixed(4)}, ${r.location.lng.toFixed(4)}`}</span></div>
            <div class="detail-row"><span class="detail-label">Agency</span><span class="detail-value">${r.agency ? r.agency.name : 'Auto-assigned'}</span></div>
            <div class="detail-row"><span class="detail-label">Officer</span><span class="detail-value">${r.assignedOfficer ? r.assignedOfficer.name : 'Pending'}</span></div>
            <div class="detail-row"><span class="detail-label">Date</span><span class="detail-value">${formatDate(r.createdAt)}</span></div>
            ${r.image ? `<div class="report-image"><img src="${r.image}" alt="Report image"></div>` : ''}
          </div>
        `;
        document.getElementById('reportModal').classList.add('active');
      } catch (err) {
        showToast(err.message);
      }
    };

    // Real-time updates
    function onReportUpdated(data) {
      showBrowserNotification('Report Updated', `Your report status: ${data.report.status}`);
      loadReports();
    }

    loadReports();
  </script>
</body>
</html>
