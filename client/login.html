<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Safe Point</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-logo">SAFE POINT</div>
      <h1>Precision<br>Protection<br>For Everyone</h1>
      <p>Report crimes in real-time and get connected with nearby security personnel instantly.</p>
      <svg class="brand-image" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="150" cy="120" r="50" fill="#3F3F46"/>
        <path d="M80 250 C80 200 220 200 220 250 L220 400 L80 400 Z" fill="#3F3F46"/>
        <rect x="120" y="180" width="60" height="8" rx="4" fill="#BC0100"/>
      </svg>
    </div>
    <div class="auth-form-side">
      <form class="auth-form" id="loginForm">
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to your account</p>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" class="form-control" placeholder="Enter phone number" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter password" required>
        </div>

        <button type="submit" class="btn btn-red btn-block" id="loginBtn">Login</button>

        <div class="auth-footer">
          Don't have an account? <a href="/register.html" class="link">Create Account</a>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (Auth.isLoggedIn()) {
      const user = Auth.getUser();
      const routes = { citizen: '/citizen/dashboard.html', officer: '/officer/dashboard.html', super: '/super/dashboard.html' };
      window.location.href = routes[user.role] || '/';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.textContent = 'Logging in...';
      btn.disabled = true;

      try {
        const data = await api('/api/auth/login', {
          method: 'POST',
          body: {
            phone: document.getElementById('phone').value.trim(),
            password: document.getElementById('password').value
          }
        });

        Auth.setAuth(data.token, data.user);
        const routes = { citizen: '/citizen/dashboard.html', officer: '/officer/dashboard.html', super: '/super/dashboard.html' };
        window.location.href = routes[data.user.role] || '/';
      } catch (err) {
        showToast(err.message);
        btn.textContent = 'Login';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
