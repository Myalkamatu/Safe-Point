<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Safe Point - Precision protection for everyone. Report crimes in real-time.">
  <title>Safe Point - Precision Protection</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="landing-nav">
    <div class="logo">SAFE POINT</div>
    <div class="nav-links">
      <a href="/login.html">Login</a>
      <a href="/register.html" class="btn btn-red btn-sm">Get Started</a>
    </div>
  </nav>

  <section class="landing-hero">
    <div class="hero-content">
      <div class="badge">Real-time crime reporting</div>
      <h1>Precision<br>Protection<br>For Everyone</h1>
      <p>Report incidents instantly. Our system connects you with the nearest security agencies and patrol officers in real-time for faster response.</p>
      <a href="/register.html" class="btn btn-red">Report a Crime →</a>
    </div>
    <div class="hero-image">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#BC0100" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; max-width: 300px; height: auto;">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <rect x="9" y="11" width="6" height="6" rx="1" stroke="#3F3F46" fill="none"/>
        <path d="M12 11V9a2 2 0 0 1 4 0" stroke="#3F3F46"/>
      </svg>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    if (Auth.isLoggedIn()) {
      const user = Auth.getUser();
      const routes = { citizen: '/citizen/dashboard.html', officer: '/officer/dashboard.html', super: '/super/dashboard.html' };
      window.location.href = routes[user.role] || '/login.html';
    }
  </script>
</body>
</html>
