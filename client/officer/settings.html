<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Safe Point</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar"></aside>
    <main class="main-content">
      <div class="page-header"><h2>Settings</h2></div>
      <div class="page-body">
        <div class="card profile-card">
          <div class="card-header"><h3>Change Password</h3></div>
          <div class="card-body">
            <form id="passwordForm">
              <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter new password" required minlength="6">
              </div>
              <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password" required>
              </div>
              <button type="submit" class="btn btn-red">Update Password</button>
            </form>
          </div>
        </div>

        <div class="card profile-card" style="margin-top:1.5rem;">
          <div class="card-header"><h3>Notifications</h3></div>
          <div class="card-body">
            <p class="text-sm text-gray" style="margin-bottom:1rem;">Enable notifications to receive real-time crime report alerts.</p>
            <button class="btn btn-dark" onclick="enableNotifications()">Enable Notifications</button>
            <p class="text-sm text-gray" id="notifStatus" style="margin-top:0.5rem;"></p>
          </div>
        </div>

        <div class="card profile-card" style="margin-top:1.5rem;">
          <div class="card-header"><h3>Account</h3></div>
          <div class="card-body">
            <button class="btn btn-outline" onclick="Auth.clear(); window.location.href='/login.html';">Logout</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/notification.js"></script>
  <script>
    if (!Auth.requireRole('officer')) throw '';
    buildSidebar('officer', 'Settings');

    if ('Notification' in window) {
      document.getElementById('notifStatus').textContent =
        Notification.permission === 'granted' ? 'Notifications are enabled' :
        Notification.permission === 'denied' ? 'Notifications are blocked' : '';
    }

    const enableNotifications = async () => {
      await initNotifications();
      if (Notification.permission === 'granted') {
        document.getElementById('notifStatus').textContent = 'Notifications enabled!';
        showToast('Notifications enabled', 'success');
      }
    };

    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('password').value;
      const cpw = document.getElementById('confirmPassword').value;
      if (pw !== cpw) { showToast('Passwords do not match'); return; }
      try {
        await api('/api/auth/settings', { method: 'PUT', body: { password: pw } });
        showToast('Password updated', 'success');
        document.getElementById('passwordForm').reset();
      } catch (err) {
        showToast(err.message);
      }
    });
  </script>
</body>
</html>
