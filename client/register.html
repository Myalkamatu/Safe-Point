<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Safe Point</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-logo">SAFE POINT</div>
      <h1>Precision<br>Protection<br>For Everyone</h1>
      <p>Join Safe Point and help make your community safer through real-time incident reporting.</p>
      <svg class="brand-image" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#BC0100" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; max-width: 300px; height: auto;">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <rect x="9" y="11" width="6" height="6" rx="1" stroke="#3F3F46" fill="none"/>
        <path d="M12 11V9a2 2 0 0 1 4 0" stroke="#3F3F46"/>
      </svg>
    </div>
    <div class="auth-form-side">
      <form class="auth-form" id="registerForm">
        <h2>Create Account</h2>
        <p class="subtitle">Register as a citizen to start reporting</p>

        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" class="form-control" placeholder="Enter phone number" required>
        </div>

        <div class="form-group">
          <label for="email">Email <span class="text-gray">(optional)</span></label>
          <input type="email" id="email" class="form-control" placeholder="Enter email address">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Create a password" required minlength="6">
        </div>

        <button type="submit" class="btn btn-red btn-block" id="registerBtn">Create Account</button>

        <div class="auth-footer">
          Already have an account? <a href="/login.html" class="link">Login</a>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      btn.textContent = 'Creating Account...';
      btn.disabled = true;

      try {
        const data = await api('/api/auth/register', {
          method: 'POST',
          body: {
            name: document.getElementById('name').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value
          }
        });

        Auth.setAuth(data.token, data.user);
        window.location.href = '/citizen/dashboard.html';
      } catch (err) {
        showToast(err.message);
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
